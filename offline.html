<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neo-Bot Studio — Офлайн</title>
  <style>
    body { 
      font-family: system-ui, sans-serif; 
      background: #0f0f13; 
      color: #fff; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      min-height: 100vh; 
      margin: 0; 
      text-align: center; 
      padding: 20px;
    }
    .offline-card {
      max-width: 400px;
      padding: 30px;
      background: #1a1a25;
      border-radius: 16px;
      border: 1px solid #7c3aed33;
    }
    .icon { font-size: 48px; margin-bottom: 16px; }
    h1 { margin: 0 0 12px; font-size: 20px; }
    p { margin: 0 0 20px; color: #aaa; }
    button {
      background: #7c3aed;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
    }
    button:hover { background: #6d28d9; }
  </style>
</head>
<body>
  <div class="offline-card">
    <div class="icon">📴</div>
    <h1>Нет соединения</h1>
    <p>Neo-Bot Studio работает офлайн. Проверьте, что модель Qwen уже загружена, или подключитесь к сети.</p>
    <button onclick="location.reload()">🔄 Попробовать снова</button>
  </div>
</body>
</html>
